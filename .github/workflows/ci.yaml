name: Continuous Integration tests

on:
  # Trigger the jobs on each push or PR merge to main branch
  pull_request:
  push:
    branches:
      - main

jobs:
  ci-tests:
    name: CI tests
    runs-on: ubuntu-latest

    steps:
      # Check out project in agent/ subfolder
      - uses: actions/checkout@v5
        with:
          path: agent

      # Check out environment dependency in gym-collabsort/ subfolder.
      # Needed for local editable dependency in pyproject.toml
      - uses: actions/checkout@v5
        with:
          repository: bpesquet/gym-collabsort
          path: gym-collabsort
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "agent/.python-version"

      - name: Install uv with caching enabled
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install the project in agent/ subfolder
        working-directory: agent
        run: uv sync --locked --all-extras --dev

      - name: Run linting
        run: uvx ruff check

      - name: Check code formatting
        run: uvx ruff format --check

      - name: Run type checking
        run: uvx ty check

      - name: Run tests
        working-directory: agent
        run: uv run pytest
